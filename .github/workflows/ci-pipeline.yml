name: DataOps CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Baixa o código do seu repositório para a máquina virtual do GitHub
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Instala o Java (Obrigatório para o Apache Spark rodar nos bastidores)
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    # 3. Configura o Python na máquina virtual
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 4. Instala as dependências gratuitas (PySpark e PyTest)
    - name: Install Dependencies
      run: |
        python -m pip upgrade pip
        pip install pyspark pytest faker

    # 5. Executa os testes automatizados de Engenharia de Dados
    - name: Run Data Quality Tests
      run: |
        pytest tests/